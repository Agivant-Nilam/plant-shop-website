<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Shop:- Buy Your Dream Plants</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }        :root {
            --primary-green: #37884F;
            --light-mint: #F1F9F4;
            --text-dark: #1A1A1A;
            --text-gray: #666666;
        }body {
            background-color: var(--light-mint);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 6rem;
        }        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 0;
            background: var(--light-mint);
            margin-bottom: 2rem;
        }

        .logo {
            font-weight: 600;
            font-size: 2rem;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            margin-left: auto;
            margin-right: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-green);
        }

        .search-container {
            position: relative;
            margin-left: 2rem;
        }

        .search-input {
            padding: 0.75rem 1rem 0.75rem 3rem;
            border: 2px solid #E5E5E5;
            border-radius: 30px;
            width: 300px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            border-color: var(--primary-green);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
        }        .hero {
            display: flex;
            align-items: center;
            gap: 0;
            height: calc(100vh - 100px);
            position: relative;
            padding: 0;
            overflow: hidden;
        }

        .hero-content {
            flex: 0 0 45%;
            padding: 2rem 0;
            padding-left: 2rem;
        }        .hero-image {
            flex: 0 0 55%;
            position: relative;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            height: 100%;
            margin-right: -4rem;
        }        .plant-img {
            width: auto;
            height: 90%;
            object-fit: contain;
            position: relative;
            z-index: 1;
        }        .hero h2 {
            font-size: 6rem;
            color: var(--text-dark);
            font-weight: 500;
            margin-bottom: 0;
            line-height: 1;
        }

        .hero h1 {
            font-size: 6rem;
            color: var(--primary-green);
            margin-bottom: 2.5rem;
            line-height: 1;
            font-weight: 500;
        }

        .hero p {
            color: var(--text-gray);
            margin-bottom: 3rem;
            font-size: 1.5rem;
            line-height: 1.5;
            max-width: 85%;
            font-weight: 400;
        }.shop-now-btn {
            background: var(--primary-green);
            color: white;
            padding: 1.25rem 3rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 2.5rem;
            transition: all 0.3s ease;
        }

        .shop-now-btn:hover {
            transform: translateY(-2px);
            background: #2D7341;
        }

        .price-tag {
            font-size: 1.25rem;
            color: var(--text-dark);
            font-weight: 600;
        }

        .slider-indicator {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-dark);
        }

        .slider-indicator::before {
            content: "";
            width: 60px;
            height: 2px;
            background-color: var(--text-dark);
        }

        .slider-number {
            font-size: 1.75rem;
            font-weight: 600;
        }

        .slider-total {
            font-size: 1.1rem;
            color: var(--text-gray);
            margin-left: 2px;
        }

        @media (max-width: 1024px) {
            .container {
                padding: 0 2rem;
            }
            
            .hero {
                gap: 3rem;
            }

            .hero h1 {
                font-size: 3.5rem;
            }

            .hero h2 {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding-top: 2rem;
            }

            .nav-links {
                display: none;
            }

            .hero p {
                max-width: 100%;
            }

            .hero h1 {
                font-size: 3rem;
            }

            .hero h2 {
                font-size: 2rem;
            }

            .slider-indicator {
                left: 50%;
                transform: translateX(-50%);
            }
        }

        .auth-buttons {
            display: flex;
            gap: 1rem;
        }        .btn-login {
            padding: 0.75rem 2rem;
            background: var(--primary-green);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-register {
            padding: 0.75rem 2rem;
            border: none;
            background: var(--primary-green);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-login:hover, .btn-register:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>    <div class="container">
        <nav class="navbar">
            <a href="#" class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 3C16.4183 3 20 6.58172 20 11C20 15.4183 16.4183 19 12 19C7.58172 19 4 15.4183 4 11C4 6.58172 7.58172 3 12 3Z" fill="#1E6B4E"/>
                    <path d="M12 7C12 7 14 9 14 11C14 13 12 15 12 15M12 7C12 7 10 9 10 11C10 13 12 15 12 15M12 7V5M12 15V17" stroke="white" stroke-width="1.5"/>
                </svg>
                Planty
            </a>
            <div class="nav-links">
                <a href="#home">Home</a>
                <a href="#about">About</a>
                <a href="#all-category">All Category</a>
                <a href="#shop">Shop</a>
                <a href="#blog">Blog</a>
                <a href="#contact">Contact Us</a>
            </div>
            <div class="auth-buttons">
                <button class="btn-login">Login</button>
                <button class="btn-register">Register</button>
            </div>
        </nav>        <section class="hero">            <div class="hero-content">
                <h2>Let's Bring</h2>
                <h1>A New Friend Home</h1>
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Proin dapibus diam in consequat tempor. </p>
                <button class="shop-now-btn">Shop Now</button>
                <div class="price-tag">New Price: $30</div>
            </div><div class="hero-image">
                <img src="monstera.png" alt="Monstera Plant" class="plant-img">
                <div class="slider-indicator">
                    <span class="slider-number">01</span>
                    <span class="slider-total">/04</span>
                </div>
            </div>
        </section>        
    </div>
</body>
</html>
